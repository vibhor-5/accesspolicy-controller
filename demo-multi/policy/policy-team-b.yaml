---
apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: team-b-policy
  namespace: quickstart-ns
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: demo-gateway
  action: Allow
  rules:
    - name: team-b-allow-echo
      source:
        type: ServiceAccount
        serviceAccount:
          name: default
      authorization:
        type: CEL
        cel:
          expression: "request.mcp.tool_name == 'echo'"
