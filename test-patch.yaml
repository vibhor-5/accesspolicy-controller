apiVersion: agentic.agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: demo-access-policy
  namespace: quickstart-ns
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: demo-gateway
  rules:
    - name: allow-get-sum
      authorization:
        type: CEL
        cel:
          expression: "request.mcp.tool_name == 'get-sum'"
    - name: allow-echo
      authorization:
        type: CEL
        cel:
          expression: "request.mcp.tool_name == 'echo'"
    - name: allow-non-tools
      authorization:
        type: CEL
        cel:
          expression: "!('x-mcp-toolname' in request.headers) || request.headers['x-mcp-toolname'] == ''"
