# This rule is not used by the project accesspolicy itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over agentic.agentic.networking.x-k8s.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: accesspolicy
    app.kubernetes.io/managed-by: kustomize
  name: xaccesspolicy-admin-role
rules:
- apiGroups:
  - agentic.agentic.networking.x-k8s.io
  resources:
  - xaccesspolicies
  verbs:
  - '*'
- apiGroups:
  - agentic.agentic.networking.x-k8s.io
  resources:
  - xaccesspolicies/status
  verbs:
  - get
