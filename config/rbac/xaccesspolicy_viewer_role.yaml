# This rule is not used by the project accesspolicy itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to agentic.agentic.networking.x-k8s.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: accesspolicy
    app.kubernetes.io/managed-by: kustomize
  name: xaccesspolicy-viewer-role
rules:
- apiGroups:
  - agentic.agentic.networking.x-k8s.io
  resources:
  - xaccesspolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agentic.agentic.networking.x-k8s.io
  resources:
  - xaccesspolicies/status
  verbs:
  - get
