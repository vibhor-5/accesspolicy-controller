# This rule is not used by the project accesspolicy itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the agentic.agentic.networking.x-k8s.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: accesspolicy
    app.kubernetes.io/managed-by: kustomize
  name: xaccesspolicy-editor-role
rules:
- apiGroups:
  - agentic.agentic.networking.x-k8s.io
  resources:
  - xaccesspolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agentic.agentic.networking.x-k8s.io
  resources:
  - xaccesspolicies/status
  verbs:
  - get
