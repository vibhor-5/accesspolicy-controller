---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: demo-gateway
  namespace: quickstart-ns
  annotations:
    networking.istio.io/service-type: ClusterIP
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-route
  namespace: quickstart-ns
spec:
  hostnames: ["localhost"]
  parentRefs:
    - name: demo-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mcp-server
          port: 3001
---
apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: demo-access-policy
  namespace: quickstart-ns
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: demo-gateway
  action: Allow
  rules:
    - name: allow-get-sum
      source:
        type: ServiceAccount
        serviceAccount:
          name: default
      authorization:
        type: CEL
        cel:
          expression: "request.mcp.tool_name == 'get-sum'"
    - name: allow-echo
      source:
        type: ServiceAccount
        serviceAccount:
          name: default
      authorization:
        type: CEL
        cel:
          expression: "request.mcp.tool_name == 'echo'"
    - name: allow-non-tools
      source:
        type: ServiceAccount
        serviceAccount:
          name: default
      authorization:
        type: CEL
        cel:
          expression: "!(has(request.headers) && 'x-mcp-toolname' in request.headers) || request.headers['x-mcp-toolname'] == ''"
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-mcp-system-routes
  namespace: quickstart-ns
spec:
  from:
    - group: mcp.kuadrant.io
      kind: MCPGatewayExtension
      namespace: mcp-system
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: mcp-system
  to:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: demo-gateway
---
apiVersion: mcp.kuadrant.io/v1alpha1
kind: MCPGatewayExtension
metadata:
  name: mcp-gateway-extension
  namespace: mcp-system
spec:
  publicHost: localhost
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: demo-gateway
    namespace: quickstart-ns
    sectionName: http
