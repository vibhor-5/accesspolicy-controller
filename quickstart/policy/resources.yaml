---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: demo-gateway
  namespace: quickstart-ns
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-route
  namespace: quickstart-ns
spec:
  parentRefs:
    - name: demo-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mcp-server
          port: 3001
---
apiVersion: agentic.agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: demo-access-policy
  namespace: quickstart-ns
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: demo-gateway
  rules:
    - name: allow-get-sum
      authorization:
        type: CEL
        cel:
          expression: "request.mcp.tool_name == 'get-sum'"
    - name: allow-echo
      authorization:
        type: CEL
        cel:
          expression: "request.mcp.tool_name == 'echo'"
    - name: allow-non-tools
      authorization:
        type: CEL
        cel:
          expression: "!(has(request.http.headers) && 'x-mcp-toolname' in request.http.headers) || request.http.headers['x-mcp-toolname'] == ''"
