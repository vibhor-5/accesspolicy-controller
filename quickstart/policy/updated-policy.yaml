---
# Updated policy: swaps 'echo' for 'get-tiny-image' to demonstrate
# dynamic policy updates. Apply with:
#   kubectl apply -f quickstart/policy/updated-policy.yaml
apiVersion: agentic.agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: demo-access-policy
  namespace: quickstart-ns
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: demo-gateway
  rules:
    - name: allow-get-sum
      authorization:
        type: CEL
        cel:
          expression: "request.mcp.tool_name == 'get-sum'"
    - name: allow-get-tiny-image
      authorization:
        type: CEL
        cel:
          expression: "request.mcp.tool_name == 'get-tiny-image'"
