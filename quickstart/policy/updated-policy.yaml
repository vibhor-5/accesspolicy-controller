---
# Updated policy: swaps 'echo' for 'get-tiny-image' to demonstrate
# dynamic policy updates. Apply with:
#   kubectl apply -f quickstart/policy/updated-policy.yaml
apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: demo-access-policy
  namespace: quickstart-ns
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: demo-gateway
  action: Allow
  rules:
    - name: allow-get-sum
      source:
        type: ServiceAccount
        serviceAccount:
          name: default
      authorization:
        type: Inline
        mcp:
          methods:
            - name: tools/call
              params: ["get-sum"]
    - name: allow-get-tiny-image
      source:
        type: ServiceAccount
        serviceAccount:
          name: default
      authorization:
        type: Inline
        mcp:
          methods:
            - name: tools/call
              params: ["get-tiny-image"]
    - name: allow-non-tools
      source:
        type: ServiceAccount
        serviceAccount:
          name: default
      authorization:
        type: Inline
        mcpBaseProtocolMethodsOption: MATCH_BASE_PROTOCOL_METHODS
