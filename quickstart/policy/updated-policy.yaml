---
# Updated policy: swaps 'echo' for 'get-tiny-image' to demonstrate
# dynamic policy updates. Apply with:
#   kubectl apply -f quickstart/policy/updated-policy.yaml
apiVersion: agentic.networking.x-k8s.io/v1alpha1
kind: XAccessPolicy
metadata:
  name: demo-access-policy
  namespace: quickstart-ns
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: demo-gateway
  action: Allow
  rules:
    - name: allow-get-sum
      source:
        type: ServiceAccount
        serviceAccount:
          name: default
      authorization:
        type: CEL
        cel:
          expression: "request.mcp.tool_name == 'get-sum'"
    - name: allow-get-tiny-image
      source:
        type: ServiceAccount
        serviceAccount:
          name: default
      authorization:
        type: CEL
        cel:
          expression: "request.mcp.tool_name == 'get-tiny-image'"
    - name: allow-non-tools
      source:
        type: ServiceAccount
        serviceAccount:
          name: default
      authorization:
        type: CEL
        cel:
          expression: "!(has(request.headers) && 'x-mcp-toolname' in request.headers) || request.headers['x-mcp-toolname'] == ''"
