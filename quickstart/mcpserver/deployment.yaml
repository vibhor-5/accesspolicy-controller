---
apiVersion: v1
kind: Namespace
metadata:
  name: quickstart-ns
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: quickstart-ns
  labels:
    app: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server
  template:
    metadata:
      labels:
        app: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: accesspolicy-mcp-server:demo
          imagePullPolicy: Never
          env:
            - name: PORT
              value: "3001"
          ports:
            - containerPort: 3001
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: quickstart-ns
  labels:
    app: mcp-server
spec:
  type: ClusterIP
  selector:
    app: mcp-server
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
