---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-agent
  namespace: quickstart-ns
  labels:
    app: mcp-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-agent
  template:
    metadata:
      labels:
        app: mcp-agent
    spec:
      containers:
        - name: mcp-agent
          image: accesspolicy-agent:demo
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: GATEWAY_URL
              value: "http://demo-gateway.quickstart-ns.svc.cluster.local:8080"
            - name: LLM_MODEL
              value: "gemini-2.0-flash"
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: google-api-key
                  key: api-key
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-agent
  namespace: quickstart-ns
  labels:
    app: mcp-agent
spec:
  type: ClusterIP
  selector:
    app: mcp-agent
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
